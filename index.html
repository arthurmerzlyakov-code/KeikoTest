<style>
  :root {
    --black: #0a0a0a;
    --dark: #111318;
    --card: #1a1d24;
    --border: #2a2d36;
    --accent: #e8c84a;
    --accent2: #ff4d4d;
    --text: #eaeaea;
    --muted: #7a7f8e;
    --white: #ffffff;
    --radius: 12px;
    --wa: #25D366;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--dark);
    border-bottom: 2px solid var(--accent);
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    height: 64px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .logo span { color: var(--white); }

  .search-wrap {
    flex: 1;
    max-width: 400px;
  }

  .search-wrap input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Nunito', sans-serif;
    outline: none;
    transition: border-color .2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  /* FILTERS */
  .filters-wrap {
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filters-wrap::-webkit-scrollbar { display: none; }

  .filters {
    display: flex;
    gap: 8px;
    min-width: max-content;
  }

  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 18px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
    letter-spacing: .5px;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--black);
  }

  /* HERO BAND */
  .hero-band {
    background: linear-gradient(135deg, #1a1d24 0%, #0f1117 100%);
    padding: 32px 20px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .hero-band::before {
    content: 'BJJ';
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 200px;
    color: rgba(232,200,74,.04);
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    pointer-events: none;
    letter-spacing: 20px;
  }

  .hero-band h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 6vw, 56px);
    letter-spacing: 4px;
    color: var(--white);
    position: relative;
  }

  .hero-band h1 span { color: var(--accent); }

  .hero-band p {
    color: var(--muted);
    margin-top: 8px;
    font-size: 14px;
    position: relative;
  }

  /* COUNT */
  .count-bar {
    padding: 12px 20px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
  }

  .count-bar span { color: var(--accent); }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    padding: 0 16px 60px;
  }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    animation: fadeIn .3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 8px 32px rgba(232,200,74,.12);
  }

  .card-img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: cover;
    background: #1e212b;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--border);
    letter-spacing: 2px;
    position: relative;
    overflow: hidden;
  }

  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card-img .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: linear-gradient(135deg, #1e212b, #252830);
  }

  .card-img .placeholder .icon {
    font-size: 40px;
    opacity: .4;
  }

  .card-img .placeholder .label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--muted);
    opacity: .6;
  }

  .badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: var(--accent2);
    color: #fff;
    font-size: 10px;
    font-weight: 800;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .badge.new { background: var(--accent); color: var(--black); }

  .card-body {
    padding: 12px;
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 8px;
  }

  .card-cat {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .card-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.3;
    flex: 1;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-top: auto;
  }

  .price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .wa-btn {
    background: var(--wa);
    color: #fff;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background .2s, transform .1s;
    white-space: nowrap;
    text-decoration: none;
    letter-spacing: .3px;
  }

  .wa-btn:hover { background: #1eb854; }
  .wa-btn:active { transform: scale(.96); }

  /* EMPTY */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty .icon { font-size: 60px; margin-bottom: 16px; }
  .empty p { font-size: 16px; }

  /* FOOTER */
  footer {
    background: var(--dark);
    border-top: 1px solid var(--border);
    text-align: center;
    padding: 24px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  footer a {
    color: var(--wa);
    text-decoration: none;
    font-weight: 700;
  }

  /* MOBILE */
  @media (max-width: 480px) {
    .logo { font-size: 22px; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 10px 40px; }
    .card-name { font-size: 12px; }
    .price { font-size: 17px; }
    .wa-btn { padding: 7px 9px; font-size: 11px; }
  }

  @media (max-width: 360px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  }
</style>
</head>

  return `https://wa.me/${WA}?text=${msg}`;
}

function badgeHTML(badge) {
  if (!badge) return '';
  const labels = { new:'NEW', hot:'🔥 ХИТ' };
  const cls = badge === 'new' ? 'badge new' : 'badge';
  return `<div class="${cls}">${labels[badge] || badge}</div>`;
}

function renderCard(p) {
  const cat = CATS[p.cat];
  return `
    <div class="card" data-cat="${p.cat}" data-name="${p.name.toLowerCase()}">
      <div class="card-img">
        <div class="placeholder">
          <div class="icon">${cat.icon}</div>
          <div class="label">${cat.label}</div>
        </div>
        ${badgeHTML(p.badge)}
      </div>
      <div class="card-body">
        <div class="card-cat">${cat.label}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-footer">
          <div class="price">${p.price.toLocaleString('ru-RU')} ₸</div>
          <a class="wa-btn" href="${waLink(p)}" target="_blank" rel="noopener">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Заказать
          </a>
        </div>
      </div>
    </div>
  `;
}

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterProducts();
}

function filterProducts() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const grid = document.getElementById('grid');

  const filtered = products.filter(p => {
    const matchCat = currentFilter === 'all' || p.cat === currentFilter;
    const matchQ = !q || p.name.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('count').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty">
        <div class="icon">🥋</div>
        <p>Товары не найдены</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(renderCard).join('');
}

// Init
filterProducts();
</script>
</body>
</html>
